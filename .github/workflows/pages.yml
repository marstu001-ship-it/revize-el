name: Deploy GitHub Pages

# Náhrada za zaseklý legacy "Deploy from branch" pages-build-deployment.
# Po opakovaných buildech selhal automatický pages workflow a nové pushe
# se přestaly deployovat (stále stuck na v9.13).
#
# Tento workflow uploadne celé repo jako Pages artifact a deployne ho.
# Spouští se na každý push do main, plus dá se ručně z UI (workflow_dispatch).
#
# DŮLEŽITÉ: aby tento workflow měl permission deploynout, je potřeba
# v repo Settings → Pages přepnout Source z "Deploy from a branch" na
# "GitHub Actions". Bez toho přepnutí se workflow spustí, ale deploy
# selže na chybějícím oprávnění.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Cesta k složce, která se má deploynout (root repa)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
